<section class="card">
    <h2>{{ title }}</h2>

    <form class="form">
        <label>
            Nome
            <input type="text" placeholder="Ex: NIKE Air Zomm Mercurial Vapor"/>
        </label>
        <label>
            Descrição
            <input placeholder="Ex: Chuteira Nike Air Zoom Mercurial Vapor 16 Elite Vini Jr Campo"/>
        </label>
        <label>
            Preco
            <input type="number" placeholder="3500"/>
        </label>
        <button type="button" (click)="salvar()">Cadastrar</button>
    </form>

</section>
